<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="system-ui, -apple-system, sans-serif">
  <title>09 — Agent-link approval page, returning user (straight to consent)</title>
  <rect width="1280" height="800" fill="#fff"/>

  <!-- browser chrome -->
  <rect x="8" y="8" width="1264" height="784" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="56" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="80" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="112" y="16" width="800" height="32" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="128" y="32" font-size="14" fill="#666" stroke="none" dominant-baseline="central">https://share.tinycloud.xyz/a/7GHK-PMQR</text>
  <line x1="8" y1="56" x2="1272" y2="56" stroke="#000" stroke-width="1.5"/>

  <!-- consent card (no step indicator) -->
  <rect x="384" y="160" width="512" height="520" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>

  <!-- known identity row -->
  <circle cx="424" cy="200" r="16" fill="#e6e6e6" stroke="#000" stroke-width="1.5"/>
  <text x="456" y="192" font-size="14" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">bob@gmail.com</text>
  <text x="456" y="216" font-size="12" fill="#666" stroke="none" dominant-baseline="central">email verified ✓ · known device</text>
  <circle cx="344" cy="200" r="8" fill="#000"/>
  <text x="344" y="200" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">1</text>
  <line x1="408" y1="240" x2="872" y2="240" stroke="#000" stroke-width="1.5"/>

  <!-- agent row -->
  <rect x="416" y="264" width="48" height="48" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="440" y="288" font-size="28" fill="#000" stroke="none" text-anchor="middle" dominant-baseline="central">🤖</text>
  <text x="480" y="280" font-size="14" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">"Agent B" on Bob's-MacBook</text>
  <text x="480" y="304" font-size="12" fill="#666" stroke="none" dominant-baseline="central">wants to access:</text>

  <!-- access summary -->
  <rect x="408" y="336" width="464" height="136" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="432" y="368" font-size="14" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">📄 README.md</text>
  <text x="592" y="368" font-size="12" fill="#666" stroke="none" dominant-baseline="central">shared by Adam Turing ✓</text>
  <text x="432" y="408" font-size="12" fill="#000" stroke="none" dominant-baseline="central"><tspan fill="#666">Access:</tspan> read-only · this document only</text>
  <text x="432" y="440" font-size="12" fill="#000" stroke="none" dominant-baseline="central"><tspan fill="#666">Duration:</tspan> 7 days · renewable</text>

  <!-- code match -->
  <rect x="408" y="496" width="464" height="64" fill="#e6e6e6"/>
  <text x="432" y="528" font-size="12" fill="#666" stroke="none" dominant-baseline="central">Code shown by your agent</text>
  <text x="656" y="528" font-size="20" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">7GHK-PMQR</text>
  <text x="792" y="528" font-size="12" fill="#000" stroke="none" dominant-baseline="central">✓ matches</text>
  <circle cx="344" cy="528" r="8" fill="#000"/>
  <text x="344" y="528" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">2</text>

  <!-- actions -->
  <rect x="408" y="584" width="272" height="48" rx="8" fill="#000"/>
  <text x="544" y="608" font-size="14" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">Approve access</text>
  <rect x="696" y="584" width="176" height="48" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="784" y="608" font-size="14" fill="#000" stroke="none" text-anchor="middle" dominant-baseline="central">Deny</text>
  <text x="640" y="656" font-size="12" fill="#666" stroke="none" text-anchor="middle" dominant-baseline="central">One Face ID confirms — no email code needed.</text>
  <circle cx="344" cy="608" r="8" fill="#000"/>
  <text x="344" y="608" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">3</text>
</svg>
