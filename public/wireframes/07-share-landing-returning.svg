<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="system-ui, -apple-system, sans-serif">
  <title>07 — Share landing, returning recipient (fast path)</title>
  <rect width="1280" height="800" fill="#fff"/>

  <!-- browser chrome -->
  <rect x="8" y="8" width="1264" height="784" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="56" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="80" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="112" y="16" width="800" height="32" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="128" y="32" font-size="14" fill="#666" stroke="none" dominant-baseline="central">https://share.tinycloud.xyz/s/bafygxk3…#k=…</text>
  <line x1="8" y1="56" x2="1272" y2="56" stroke="#000" stroke-width="1.5"/>

  <!-- compact card -->
  <rect x="448" y="224" width="384" height="352" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="640" cy="288" r="24" fill="#e6e6e6" stroke="#000" stroke-width="1.5"/>
  <text x="640" y="336" font-size="14" fill="#666" stroke="none" text-anchor="middle" dominant-baseline="central">Welcome back,</text>
  <text x="640" y="368" font-size="20" font-weight="600" fill="#000" stroke="none" text-anchor="middle" dominant-baseline="central">bob@gmail.com</text>
  <circle cx="416" cy="368" r="8" fill="#000"/>
  <text x="416" y="368" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">1</text>

  <!-- file card -->
  <rect x="480" y="400" width="320" height="64" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="496" y="416" width="24" height="32" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="536" y="424" font-size="14" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">README.md</text>
  <text x="536" y="440" font-size="12" fill="#666" stroke="none" dominant-baseline="central">from Adam Turing ✓</text>

  <!-- single action -->
  <rect x="480" y="488" width="320" height="48" rx="8" fill="#000"/>
  <text x="640" y="512" font-size="14" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">Unlock with Face ID</text>
  <circle cx="416" cy="512" r="8" fill="#000"/>
  <text x="416" y="512" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">2</text>
  <text x="640" y="552" font-size="12" fill="#666" stroke="none" text-anchor="middle" dominant-baseline="central">No email code — your address is already verified.</text>

  <!-- speed note -->
  <text x="640" y="624" font-size="12" fill="#666" stroke="none" text-anchor="middle" dominant-baseline="central">⏱ ~2 seconds from click to content</text>
  <circle cx="416" cy="624" r="8" fill="#000"/>
  <text x="416" y="624" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">3</text>
</svg>
