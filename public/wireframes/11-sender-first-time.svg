<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="system-ui, -apple-system, sans-serif">
  <title>11 — First-time sender: handoff to account.tinycloud.xyz signup, then share resumes</title>
  <rect width="1280" height="800" fill="#fff"/>

  <!-- ============ left half: chat frame ============ -->
  <rect x="8" y="8" width="616" height="784" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="56" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="80" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="320" y="32" font-size="14" font-weight="600" fill="#000" stroke="none" text-anchor="middle" dominant-baseline="central">Adam ⇄ Agent A</text>
  <line x1="8" y1="56" x2="624" y2="56" stroke="#000" stroke-width="1.5"/>

  <!-- Adam message -->
  <rect x="296" y="80" width="304" height="48" rx="16" fill="#000"/>
  <text x="320" y="104" font-size="14" fill="#fff" stroke="none" dominant-baseline="central">Share this README with Bob.</text>

  <!-- Agent: account handoff -->
  <rect x="32" y="152" width="536" height="176" rx="16" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="56" y="184" font-size="14" fill="#000" stroke="none" dominant-baseline="central">You don't have a TinyCloud account yet.</text>
  <text x="56" y="216" font-size="14" fill="#000" stroke="none" dominant-baseline="central">Set one up here (takes ~1 min):</text>
  <rect x="56" y="240" width="352" height="32" fill="#e6e6e6"/>
  <text x="72" y="256" font-size="12" fill="#000" stroke="none" dominant-baseline="central" font-family="ui-monospace, monospace">→ https://account.tinycloud.xyz</text>
  <text x="56" y="296" font-size="12" fill="#666" stroke="none" dominant-baseline="central">I'll continue the share once you're set up.</text>
  <circle cx="592" cy="216" r="8" fill="#000"/>
  <text x="592" y="216" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">1</text>

  <!-- Agent: share resumes -->
  <rect x="32" y="376" width="536" height="112" rx="16" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="56" y="408" font-size="14" fill="#000" stroke="none" dominant-baseline="central">✅ Account ready. Now — send to bob@gmail.com,</text>
  <text x="56" y="440" font-size="14" fill="#000" stroke="none" dominant-baseline="central">read-only, 30 days?</text>
  <circle cx="592" cy="408" r="8" fill="#000"/>
  <text x="592" y="408" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">5</text>

  <!-- quick replies -->
  <rect x="56" y="512" width="128" height="48" rx="8" fill="#000"/>
  <text x="120" y="536" font-size="14" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">Yes, share</text>
  <rect x="200" y="512" width="112" height="48" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="256" y="536" font-size="14" fill="#000" stroke="none" text-anchor="middle" dominant-baseline="central">Change…</text>

  <!-- input bar -->
  <line x1="8" y1="728" x2="624" y2="728" stroke="#000" stroke-width="1.5"/>
  <rect x="32" y="744" width="488" height="32" rx="16" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="56" y="760" font-size="14" fill="#666" stroke="none" dominant-baseline="central">Message Agent A…</text>
  <rect x="536" y="744" width="64" height="32" rx="8" fill="#000"/>
  <text x="568" y="760" font-size="14" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">Send</text>

  <!-- ============ right half: browser frame (account.tinycloud.xyz) ============ -->
  <rect x="656" y="8" width="616" height="784" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="680" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="704" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="728" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="752" y="16" width="488" height="32" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="768" y="32" font-size="14" fill="#666" stroke="none" dominant-baseline="central">https://account.tinycloud.xyz</text>
  <line x1="656" y1="56" x2="1272" y2="56" stroke="#000" stroke-width="1.5"/>

  <!-- signup: title -->
  <text x="720" y="120" font-size="28" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">TinyCloud Account</text>
  <text x="720" y="152" font-size="14" fill="#666" stroke="none" dominant-baseline="central">One key. Your data, where you want it.</text>

  <!-- (1) create key -->
  <rect x="720" y="192" width="480" height="48" rx="8" fill="#000"/>
  <text x="960" y="216" font-size="14" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">🔑 Create your key — Continue with passkey</text>
  <text x="960" y="264" font-size="12" fill="#666" stroke="none" text-anchor="middle" dominant-baseline="central">One Face ID. No password.</text>
  <circle cx="688" cy="216" r="8" fill="#000"/>
  <text x="688" y="216" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">2</text>

  <!-- (2) hosting chooser -->
  <text x="720" y="312" font-size="14" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">Where should your data live?</text>
  <circle cx="688" cy="376" r="8" fill="#000"/>
  <text x="688" y="376" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">3</text>

  <rect x="720" y="344" width="480" height="104" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="752" cy="376" r="8" fill="#000"/>
  <text x="776" y="376" font-size="14" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">TinyCloud hosted</text>
  <text x="776" y="400" font-size="12" fill="#666" stroke="none" dominant-baseline="central">Works instantly — a space on our infrastructure.</text>
  <text x="776" y="424" font-size="12" fill="#666" stroke="none" dominant-baseline="central">Pre-selected default.</text>

  <rect x="720" y="472" width="480" height="136" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="752" cy="504" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="776" y="504" font-size="14" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">Self-hosted</text>
  <text x="776" y="528" font-size="12" fill="#666" stroke="none" dominant-baseline="central">Point at your own tinycloud-node.</text>
  <rect x="776" y="552" width="376" height="32" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="792" y="568" font-size="12" fill="#666" stroke="none" dominant-baseline="central" font-family="ui-monospace, monospace">https://node.your-domain.com</text>

  <!-- (3) agent-account footer note -->
  <line x1="720" y1="648" x2="1200" y2="648" stroke="#000" stroke-width="1.5"/>
  <text x="720" y="680" font-size="12" fill="#666" stroke="none" dominant-baseline="central">Agents can create an account for you via the TinyCloud CLI —</text>
  <text x="720" y="704" font-size="12" fill="#666" stroke="none" dominant-baseline="central">but your account should be yours. You can claim an</text>
  <text x="720" y="728" font-size="12" fill="#666" stroke="none" dominant-baseline="central">agent-created account later.</text>
  <circle cx="688" cy="680" r="8" fill="#000"/>
  <text x="688" y="680" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">4</text>
</svg>
