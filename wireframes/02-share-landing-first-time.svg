<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="system-ui, -apple-system, sans-serif">
  <title>02 — Share landing, first-time human recipient</title>
  <rect width="1280" height="800" fill="#fff"/>

  <!-- browser chrome -->
  <rect x="8" y="8" width="1264" height="784" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="56" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="80" cy="32" r="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="112" y="16" width="800" height="32" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="128" y="32" font-size="14" fill="#666" stroke="none" dominant-baseline="central">https://share.tinycloud.xyz/s/bafygxk3…#k=…</text>
  <line x1="8" y1="56" x2="1272" y2="56" stroke="#000" stroke-width="1.5"/>

  <!-- claim card -->
  <rect x="384" y="112" width="512" height="488" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>

  <!-- verified sender header -->
  <circle cx="440" cy="176" r="24" fill="#e6e6e6" stroke="#000" stroke-width="1.5"/>
  <text x="480" y="168" font-size="14" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">Adam Turing ✓</text>
  <text x="480" y="192" font-size="12" fill="#666" stroke="none" dominant-baseline="central">adam@example.com · verified sender</text>
  <circle cx="344" cy="176" r="8" fill="#000"/>
  <text x="344" y="176" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">1</text>
  <line x1="408" y1="224" x2="872" y2="224" stroke="#000" stroke-width="1.5"/>

  <!-- file card -->
  <rect x="408" y="248" width="464" height="80" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="432" y="264" width="32" height="48" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="440" y="280" width="16" height="8" fill="#e6e6e6"/>
  <rect x="440" y="296" width="16" height="8" fill="#e6e6e6"/>
  <text x="488" y="280" font-size="14" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">README.md</text>
  <text x="488" y="304" font-size="12" fill="#666" stroke="none" dominant-baseline="central">Markdown document · 8 KB</text>
  <circle cx="344" cy="288" r="8" fill="#000"/>
  <text x="344" y="288" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">2</text>

  <!-- recipient + action -->
  <text x="408" y="368" font-size="14" fill="#000" stroke="none" dominant-baseline="central">Shared with <tspan font-weight="600">b•••@gmail.com</tspan></text>
  <text x="408" y="392" font-size="12" fill="#666" stroke="none" dominant-baseline="central">To open it, confirm you own that email address.</text>

  <rect x="408" y="424" width="464" height="48" rx="8" fill="#000"/>
  <text x="640" y="448" font-size="14" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">Continue with bob@gmail.com</text>
  <circle cx="344" cy="448" r="8" fill="#000"/>
  <text x="344" y="448" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">3</text>

  <text x="640" y="496" font-size="12" fill="#666" stroke="none" text-anchor="middle" dominant-baseline="central">File name and sender are visible before you verify. Content never is.</text>

  <!-- how this works strip -->
  <rect x="384" y="632" width="512" height="104" rx="8" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="408" y="656" font-size="12" font-weight="600" fill="#000" stroke="none" dominant-baseline="central">HOW THIS WORKS</text>
  <text x="424" y="688" font-size="14" fill="#000" stroke="none" dominant-baseline="central">🔑 Passkey</text>
  <text x="424" y="712" font-size="12" fill="#666" stroke="none" dominant-baseline="central">one Face ID</text>
  <text x="536" y="688" font-size="14" fill="#666" stroke="none" dominant-baseline="central">→</text>
  <text x="576" y="688" font-size="14" fill="#000" stroke="none" dominant-baseline="central">✉️ Email code</text>
  <text x="576" y="712" font-size="12" fill="#666" stroke="none" dominant-baseline="central">one code</text>
  <text x="712" y="688" font-size="14" fill="#666" stroke="none" dominant-baseline="central">→</text>
  <text x="752" y="688" font-size="14" fill="#000" stroke="none" dominant-baseline="central">⏱ ~30 seconds</text>
  <text x="752" y="712" font-size="12" fill="#666" stroke="none" dominant-baseline="central">total</text>
  <circle cx="344" cy="688" r="8" fill="#000"/>
  <text x="344" y="688" font-size="12" fill="#fff" stroke="none" text-anchor="middle" dominant-baseline="central">4</text>
</svg>
