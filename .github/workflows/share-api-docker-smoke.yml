name: Share API Docker smoke
on:
  pull_request:
    paths: [Dockerfile.share-api, compose.share-api.yml, src/**, public/**, package*.json, .github/workflows/share-api-docker-smoke.yml]
jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      SHARE_API_IMAGE: ghcr.io/tinycloudlabs/share-api:sha-c81b0d0d07713c1a2d045a2168c80071fb201475
      CLOUDFLARE_TUNNEL_TOKEN: test-only-compose-token
      SHARE_SMOKE_TRUST_BUNDLE: >-
        {"version":"tinycloud.share-email-trust-bundle/v1","shareOrigin":"https://share.tinycloud.xyz","returnOrigin":"https://share.tinycloud.xyz","registryOrigin":"https://registry.tinycloud.xyz","credentialsOrigin":"https://witness.credentials.org","nodeOrigin":"https://node.tinycloud.xyz","nodeAudience":"did:web:node.tinycloud.xyz","nodeInvitationKid":"did:web:node.tinycloud.xyz#invitation-key-1","nodeInvitationPublicKey":"AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA","nodeKeyVersion":1,"nodeEnabled":true,"issuerDid":"did:web:issuer.credentials.org","issuerVct":"opencredentials.email/v1","issuerKid":"did:web:issuer.credentials.org#email-signing-key-1","issuerPublicKey":"AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA","issuerKeyVersion":1,"issuerEnabled":true}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate the sealed production compose shape
        env:
          SHARE_TRUST_BUNDLE_BASE64: eyJ2ZXJzaW9uIjoidGlueWNsb3VkLnNoYXJlLWVtYWlsLXRydXN0LWJ1bmRsZS92MSJ9
        run: |
          docker compose -f compose.share-api.yml config --format json > "$RUNNER_TEMP/compose.json"
          jq -e '
            .services["share-api"].build == null and
            .services["share-api"].ports == null and
            .services["share-api"].environment.SHARE_SENDER_ENABLED == "false" and
            (.services["share-api"].environment.SHARE_TRUST_BUNDLE_BASE64 | test("^[A-Za-z0-9+/=]+$")) and
            .services.cloudflared.depends_on["share-api"].condition == "service_healthy"
          ' "$RUNNER_TEMP/compose.json" >/dev/null
      - run: docker build -f Dockerfile.share-api -t share-api-smoke .
      - run: |
          mkdir -p "$RUNNER_TEMP/share-state"
          chmod 0777 "$RUNNER_TEMP/share-state"
          docker run -d --name share-api-smoke -p 8787:8787 --read-only --tmpfs /tmp \
            -e SHARE_SENDER_ENABLED=false \
            -e SHARE_TRUST_BUNDLE="$SHARE_SMOKE_TRUST_BUNDLE" \
            -e SHARE_BINDING_STORE_PATH=/var/lib/tinycloud/share/bindings.ndjson \
            -v "$RUNNER_TEMP/share-state:/var/lib/tinycloud/share" share-api-smoke
          docker exec --user 1000:1000 share-api-smoke sh -eu -c '
            probe=/var/lib/tinycloud/share/non-root-smoke
            printf "%s\n" persisted > "$probe"
            test "$(cat "$probe")" = persisted
            rm "$probe"
            test ! -e "$probe"
          '
          attempt=0
          until curl -fsS http://127.0.0.1:8787/health/readiness; do
            attempt=$((attempt + 1))
            test "$attempt" -lt 30
            sleep 2
          done
          curl -fsS http://127.0.0.1:8787/health/readiness
          test "$(curl -fsS http://127.0.0.1:8787/health/readiness)" = '{"authReady":true,"senderReady":false}'
          curl -fsS http://127.0.0.1:8787/api/share/auth/openkey/nonce
          test "$(curl -sS -o /tmp/sender.json -w '%{http_code}' -X POST http://127.0.0.1:8787/share/v1/invitations/authorize -H 'content-type: application/json' --data '{}')" = 503
      - if: always()
        run: docker logs share-api-smoke || true
