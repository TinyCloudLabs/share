name: Share API image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.share-api
      - package.json
      - package-lock.json
      - src/**
      - public/**
      - .github/workflows/share-api-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.share-api
          push: true
          tags: |
            ghcr.io/tinycloudlabs/share-api:sha-${{ github.sha }}
            ghcr.io/tinycloudlabs/share-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/tinycloudlabs/share-api
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
